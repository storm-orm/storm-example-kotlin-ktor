ktor {
    deployment {
        port = 8080
    }
    application {
        modules = [ st.orm.demo.imdb.ApplicationKt.module ]
    }
}

storm {
    datasource {
        # Note: reWriteBatchedInserts is intentionally NOT enabled — it breaks
        # the per-row affected counts that Storm verifies after batch writes.
        jdbcUrl = "jdbc:postgresql://localhost:5432/imdb"
        username = "storm"
        password = "storm"
    }
}

imdb {
    import {
        cacheDirectory = "./data"
        minimumVoteCount = 1000
        datasetBaseUrl = "https://datasets.imdbws.com"
    }
}
